name: Extract links

# Smoke test: run extract_links.py (from the web-languages-code repo) against this
# repo's data. The script globs the relative folders (living/, constructed/, extinct/,
# historical/) of THIS data repo, so we keep this repo as the working directory and check
# out the code repo into a subdirectory. Any uncaught exception fails the job.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  extract-links:
    runs-on: ubuntu-latest
    steps:
      - name: Check out data repo (this repo, web-languages)
        uses: actions/checkout@v4

      - name: Check out code repo (web-languages-code)
        uses: actions/checkout@v4
        with:
          repository: commoncrawl/web-languages-code
          path: code

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: code/requirements.txt

      - name: Install dependencies
        run: pip install -r code/requirements.txt

      - name: Run extract_links.py
        # The script glob-loads relative folders, so CWD must be this data repo's root
        # (the default checkout at $GITHUB_WORKSPACE). The script lives in the code repo.
        run: python code/extract_links.py
